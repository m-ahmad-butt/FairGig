stages:
  - build
  - deploy-services
  - deploy-gateway
  - deploy-frontend

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"
  DOCKER_REGISTRY_URL: docker.io
  DEPLOY_NETWORK: hackathon-network
  SSH_REMOTE_USER: ubuntu

default:
  tags:
    - aws

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

.main_branch_rules: &main_branch_rules
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

.docker-login: &docker-login
  before_script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

build:backend-images:
  <<: *docker-login
  stage: build
  image: public.ecr.aws/docker/library/docker:24.0.5
  services:
    - name: public.ecr.aws/docker/library/docker:24.0.5-dind
      alias: docker
  parallel:
    matrix:
      - SERVICE_NAME: api-gateway
        SERVICE_PATH: backend/api-gateway
        IMAGE_VAR: API_GATEWAY_IMAGE
      - SERVICE_NAME: auth-service
        SERVICE_PATH: backend/auth-service
        IMAGE_VAR: AUTH_IMAGE
      - SERVICE_NAME: earnings-service
        SERVICE_PATH: backend/earnings-service
        IMAGE_VAR: EARNINGS_IMAGE
      - SERVICE_NAME: grievance-service
        SERVICE_PATH: backend/grievance-service
        IMAGE_VAR: GRIEVANCE_IMAGE
      - SERVICE_NAME: certificate-service
        SERVICE_PATH: backend/certificate-service
        IMAGE_VAR: CERTIFICATE_IMAGE
      - SERVICE_NAME: shared-agent-service
        SERVICE_PATH: backend/shared-agent-service
        IMAGE_VAR: SHARED_AGENT_IMAGE
      - SERVICE_NAME: analytics-service
        SERVICE_PATH: backend/analytics-service
        IMAGE_VAR: ANALYTICS_IMAGE
      - SERVICE_NAME: anomaly-service
        SERVICE_PATH: backend/anomaly-service
        IMAGE_VAR: ANOMALY_IMAGE
  script:
    - IMAGE_REPO="$(eval "printf '%s' \"\${$IMAGE_VAR}\"")"
    - if [ -z "$IMAGE_REPO" ]; then IMAGE_REPO="${DOCKER_REGISTRY_URL}/${DOCKER_USERNAME}/${SERVICE_NAME}"; fi
    - docker build -t "${IMAGE_REPO}:${CI_COMMIT_SHORT_SHA}" -t "${IMAGE_REPO}:latest" "${SERVICE_PATH}"
    - docker push "${IMAGE_REPO}:${CI_COMMIT_SHORT_SHA}"
    - docker push "${IMAGE_REPO}:latest"
  <<: *main_branch_rules

build:frontend-image:
  <<: *docker-login
  stage: build
  image: public.ecr.aws/docker/library/docker:24.0.5
  services:
    - name: public.ecr.aws/docker/library/docker:24.0.5-dind
      alias: docker
  script:
    - IMAGE_REPO="${FRONTEND_IMAGE:-${DOCKER_REGISTRY_URL}/${DOCKER_USERNAME}/s-frontend}"
    - >
      docker build 
      --build-arg VITE_API_URL="${VITE_API_URL}" 
      --build-arg VITE_CLERK_PUBLISHABLE_KEY="${VITE_CLERK_PUBLISHABLE_KEY}" 
      --build-arg VITE_GEOCODING_API_URL="${VITE_GEOCODING_API_URL}" 
      -t "${IMAGE_REPO}:${CI_COMMIT_SHORT_SHA}" 
      -t "${IMAGE_REPO}:latest" 
      frontend
    - docker push "${IMAGE_REPO}:${CI_COMMIT_SHORT_SHA}"
    - docker push "${IMAGE_REPO}:latest"
  <<: *main_branch_rules

.ssh-setup: &ssh-setup
  - apk add --no-cache openssh-client
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - touch ~/.ssh/id_rsa
  - chmod 600 ~/.ssh/id_rsa
  - export DOCKER_PASSWORD_B64="$(printf '%s' "$DOCKER_PASSWORD" | base64 | tr -d '\n')"

.deploy_base: &deploy_base
  image: public.ecr.aws/docker/library/alpine:3.20
  before_script:
    - *ssh-setup
  <<: *main_branch_rules

deploy:api-gateway:
  <<: *deploy_base
  stage: deploy-gateway
  script:
    - SSH_KEY_CONTENT="${SOFTEC_NOT_SSH:-$SSH_PRIVATE_KEY}"
    - printf '%s\n' "$SSH_KEY_CONTENT" > ~/.ssh/id_rsa
    - IMAGE_REPO="${API_GATEWAY_IMAGE:-${DOCKER_REGISTRY_URL}/${DOCKER_USERNAME}/api-gateway}"
    - >
      ssh -o StrictHostKeyChecking=no "${SSH_REMOTE_USER}@${API_GATEWAY_EC2_IP}"
      "set -eu;
      echo '${DOCKER_PASSWORD_B64}' | base64 -d | sudo docker login -u '${DOCKER_USERNAME}' --password-stdin;
      sudo docker network create ${DEPLOY_NETWORK} >/dev/null 2>&1 || true;
      sudo docker stop api-gateway >/dev/null 2>&1 || true;
      sudo docker rm -f api-gateway >/dev/null 2>&1 || true;
      sudo docker pull ${IMAGE_REPO}:${CI_COMMIT_SHORT_SHA};
      sudo docker run -d --name api-gateway --network ${DEPLOY_NETWORK} --restart unless-stopped -p 8080:8080 -e PORT=8080 -e AUTH_SERVICE_URL='http://65.0.66.159:4001' -e EARNINGS_SERVICE_URL='http://13.200.221.201:4002' -e GRIEVANCE_SERVICE_URL='http://13.200.10.104:4003' -e CERTIFICATE_SERVICE_URL='http://13.200.9.95:4004' -e SHARED_AGENT_SERVICE_URL='http://3.110.54.136:4005' -e ANALYTICS_SERVICE_URL='http://13.233.29.255:8001' -e ANOMALY_SERVICE_URL='http://13.233.160.241:8002' ${IMAGE_REPO}:${CI_COMMIT_SHORT_SHA};
      sudo docker image prune -af >/dev/null 2>&1 || true"
  environment:
    name: production/api-gateway
    url: "http://${API_GATEWAY_EC2_IP}:8080"

deploy:node-services:
  <<: *deploy_base
  stage: deploy-services
  parallel:
    matrix:
      - SERVICE_NAME: auth-service
        SERVICE_PORT: "4001"
        DATABASE_NAME: auth_service
        MONGO_HOST_PORT: "27017"
        IMAGE_VAR: AUTH_IMAGE
        SSH_KEY_VAR: SOFTEC_LF_SSH
        TARGET_HOST_VAR: AUTH_EC2_IP
      - SERVICE_NAME: earnings-service
        SERVICE_PORT: "4002"
        DATABASE_NAME: earnings_service
        MONGO_HOST_PORT: "27018"
        IMAGE_VAR: EARNINGS_IMAGE
        SSH_KEY_VAR: SOFTEC_LF_SSH
        TARGET_HOST_VAR: EARNINGS_EC2_IP
      - SERVICE_NAME: grievance-service
        SERVICE_PORT: "4003"
        DATABASE_NAME: grievance_service
        MONGO_HOST_PORT: "27019"
        IMAGE_VAR: GRIEVANCE_IMAGE
        SSH_KEY_VAR: SOFTEC_LF_SSH
        TARGET_HOST_VAR: GRIEVANCE_EC2_IP
      - SERVICE_NAME: certificate-service
        SERVICE_PORT: "4004"
        DATABASE_NAME: certificate_service
        MONGO_HOST_PORT: "27020"
        IMAGE_VAR: CERTIFICATE_IMAGE
        SSH_KEY_VAR: SOFTEC_LF_SSH
        TARGET_HOST_VAR: CERTIFICATE_EC2_IP
      - SERVICE_NAME: shared-agent-service
        SERVICE_PORT: "4005"
        DATABASE_NAME: shared_agent_service
        MONGO_HOST_PORT: "27021"
        IMAGE_VAR: SHARED_AGENT_IMAGE
        SSH_KEY_VAR: SOFTEC_NOT_SSH
        TARGET_HOST_VAR: SHARED_AGENT_EC2_IP
  script:
    - SSH_KEY_CONTENT="$(eval "printf '%s' \"\${$SSH_KEY_VAR}\"")"
    - printf '%s\n' "$SSH_KEY_CONTENT" > ~/.ssh/id_rsa
    - TARGET_HOST="$(eval "printf '%s' \"\${$TARGET_HOST_VAR}\"")"
    - IMAGE_REPO="$(eval "printf '%s' \"\${$IMAGE_VAR}\"")"
    - if [ -z "$IMAGE_REPO" ]; then IMAGE_REPO="${DOCKER_REGISTRY_URL}/${DOCKER_USERNAME}/${SERVICE_NAME}"; fi
    - MONGO_CONTAINER="${SERVICE_NAME}-mongo"
    - >
      ssh -o StrictHostKeyChecking=no "${SSH_REMOTE_USER}@${TARGET_HOST}"
      "set -eu;
      echo '${DOCKER_PASSWORD_B64}' | base64 -d | sudo docker login -u '${DOCKER_USERNAME}' --password-stdin;
      sudo docker network create ${DEPLOY_NETWORK} >/dev/null 2>&1 || true;
      sudo docker stop ${SERVICE_NAME} >/dev/null 2>&1 || true;
      sudo docker rm -f ${SERVICE_NAME} >/dev/null 2>&1 || true;
      sudo docker stop ${MONGO_CONTAINER} >/dev/null 2>&1 || true;
      sudo docker rm -f ${MONGO_CONTAINER} >/dev/null 2>&1 || true;
      sudo docker run -d --name ${MONGO_CONTAINER} --network ${DEPLOY_NETWORK} --restart unless-stopped -p ${MONGO_HOST_PORT}:27017 -v ${MONGO_CONTAINER}-data:/data/db --entrypoint bash public.ecr.aws/docker/library/mongo:7 -c 'echo \"hackathonreplicasetkeyfilesecret1234567890\" > /tmp/keyfile && chmod 400 /tmp/keyfile && chown 999:999 /tmp/keyfile && exec docker-entrypoint.sh mongod --replSet rs0 --keyFile /tmp/keyfile --bind_ip_all';
      sleep 20;
      for i in {1..10}; do sudo docker exec ${MONGO_CONTAINER} mongosh --quiet --eval 'db.adminCommand({ping:1})' && break || sleep 3; done;
      sudo docker exec ${MONGO_CONTAINER} mongosh --quiet -u __system -p 'hackathonreplicasetkeyfilesecret1234567890' --authenticationDatabase local --eval \"const desiredHost='${MONGO_CONTAINER}:27017'; const desiredConfig={ _id: 'rs0', version: Math.floor(Date.now() / 1000), members: [{ _id: 0, host: desiredHost }] }; try { const status=rs.status(); const selfMember=(status.members || []).find(m => m.self); const currentHost=selfMember ? selfMember.name : ((status.members && status.members[0] && status.members[0].name) ? status.members[0].name : ''); if (currentHost !== desiredHost) { rs.reconfig(desiredConfig, { force: true }); } } catch (e) { const msg=(e && e.message) ? e.message : String(e); if (msg.includes('NotYetInitialized')) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: desiredHost }] }); } else { rs.reconfig(desiredConfig, { force: true }); } }\";
      for i in {1..15}; do sudo docker exec ${MONGO_CONTAINER} mongosh --quiet -u __system -p 'hackathonreplicasetkeyfilesecret1234567890' --authenticationDatabase local --eval 'db.hello().isWritablePrimary' | grep -q true && break || sleep 2; done;
      sudo docker exec ${MONGO_CONTAINER} mongosh --quiet -u __system -p 'hackathonreplicasetkeyfilesecret1234567890' --authenticationDatabase local --eval 'quit(db.hello().isWritablePrimary ? 0 : 1)';
      sudo docker pull ${IMAGE_REPO}:${CI_COMMIT_SHORT_SHA};
      sudo docker run -d --name ${SERVICE_NAME} --network ${DEPLOY_NETWORK} --restart unless-stopped -p ${SERVICE_PORT}:${SERVICE_PORT} -e PORT=${SERVICE_PORT} -e SERVICE_NAME=${SERVICE_NAME} -e FRONTEND_URL='${FRONTEND_URL}' -e DATABASE_URL='mongodb://${MONGO_CONTAINER}:27017/${DATABASE_NAME}?replicaSet=rs0&directConnection=true' -e JWT_SECRET='${JWT_SECRET}' -e JWT_REFRESH_SECRET='${JWT_REFRESH_SECRET}' -e EMAIL_HOST='${EMAIL_HOST}' -e EMAIL_PORT='${EMAIL_PORT}' -e EMAIL_USER='${EMAIL_USER}' -e EMAIL_PASS='${EMAIL_PASS}' ${IMAGE_REPO}:${CI_COMMIT_SHORT_SHA};
      sudo docker image prune -af >/dev/null 2>&1 || true"

deploy:python-services:
  <<: *deploy_base
  stage: deploy-services
  parallel:
    matrix:
      - SERVICE_NAME: analytics-service
        SERVICE_PORT: "8001"
        DATABASE_NAME: analytics_service
        MONGO_HOST_PORT: "27022"
        IMAGE_VAR: ANALYTICS_IMAGE
        SSH_KEY_VAR: SOFTEC_NOT_SSH
        TARGET_HOST_VAR: ANALYTICS_EC2_IP
      - SERVICE_NAME: anomaly-service
        SERVICE_PORT: "8002"
        DATABASE_NAME: anomaly_service
        MONGO_HOST_PORT: "27023"
        IMAGE_VAR: ANOMALY_IMAGE
        SSH_KEY_VAR: SOFTEC_NOT_SSH
        TARGET_HOST_VAR: ANOMALY_EC2_IP
  script:
    - SSH_KEY_CONTENT="$(eval "printf '%s' \"\${$SSH_KEY_VAR}\"")"
    - printf '%s\n' "$SSH_KEY_CONTENT" > ~/.ssh/id_rsa
    - TARGET_HOST="$(eval "printf '%s' \"\${$TARGET_HOST_VAR}\"")"
    - IMAGE_REPO="$(eval "printf '%s' \"\${$IMAGE_VAR}\"")"
    - if [ -z "$IMAGE_REPO" ]; then IMAGE_REPO="${DOCKER_REGISTRY_URL}/${DOCKER_USERNAME}/${SERVICE_NAME}"; fi
    - MONGO_CONTAINER="${SERVICE_NAME}-mongo"
    - >
      ssh -o StrictHostKeyChecking=no "${SSH_REMOTE_USER}@${TARGET_HOST}"
      "set -eu;
      echo '${DOCKER_PASSWORD_B64}' | base64 -d | sudo docker login -u '${DOCKER_USERNAME}' --password-stdin;
      sudo docker network create ${DEPLOY_NETWORK} >/dev/null 2>&1 || true;
      sudo docker stop ${SERVICE_NAME} >/dev/null 2>&1 || true;
      sudo docker rm -f ${SERVICE_NAME} >/dev/null 2>&1 || true;
      sudo docker stop ${MONGO_CONTAINER} >/dev/null 2>&1 || true;
      sudo docker rm -f ${MONGO_CONTAINER} >/dev/null 2>&1 || true;
      sudo docker run -d --name ${MONGO_CONTAINER} --network ${DEPLOY_NETWORK} --restart unless-stopped -p ${MONGO_HOST_PORT}:27017 -v ${MONGO_CONTAINER}-data:/data/db --entrypoint bash public.ecr.aws/docker/library/mongo:7 -c 'echo \"hackathonreplicasetkeyfilesecret1234567890\" > /tmp/keyfile && chmod 400 /tmp/keyfile && chown 999:999 /tmp/keyfile && exec docker-entrypoint.sh mongod --replSet rs0 --keyFile /tmp/keyfile --bind_ip_all';
      sleep 20;
      for i in {1..10}; do sudo docker exec ${MONGO_CONTAINER} mongosh --quiet --eval 'db.adminCommand({ping:1})' && break || sleep 3; done;
      sudo docker exec ${MONGO_CONTAINER} mongosh --quiet -u __system -p 'hackathonreplicasetkeyfilesecret1234567890' --authenticationDatabase local --eval \"const desiredHost='${MONGO_CONTAINER}:27017'; const desiredConfig={ _id: 'rs0', version: Math.floor(Date.now() / 1000), members: [{ _id: 0, host: desiredHost }] }; try { const status=rs.status(); const selfMember=(status.members || []).find(m => m.self); const currentHost=selfMember ? selfMember.name : ((status.members && status.members[0] && status.members[0].name) ? status.members[0].name : ''); if (currentHost !== desiredHost) { rs.reconfig(desiredConfig, { force: true }); } } catch (e) { const msg=(e && e.message) ? e.message : String(e); if (msg.includes('NotYetInitialized')) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: desiredHost }] }); } else { rs.reconfig(desiredConfig, { force: true }); } }\";
      for i in {1..15}; do sudo docker exec ${MONGO_CONTAINER} mongosh --quiet -u __system -p 'hackathonreplicasetkeyfilesecret1234567890' --authenticationDatabase local --eval 'db.hello().isWritablePrimary' | grep -q true && break || sleep 2; done;
      sudo docker exec ${MONGO_CONTAINER} mongosh --quiet -u __system -p 'hackathonreplicasetkeyfilesecret1234567890' --authenticationDatabase local --eval 'quit(db.hello().isWritablePrimary ? 0 : 1)';
      sudo docker pull ${IMAGE_REPO}:${CI_COMMIT_SHORT_SHA};
      sudo docker run -d --name ${SERVICE_NAME} --network ${DEPLOY_NETWORK} --restart unless-stopped -p ${SERVICE_PORT}:${SERVICE_PORT} -e PORT=${SERVICE_PORT} -e SERVICE_NAME=${SERVICE_NAME} -e FRONTEND_URL='${FRONTEND_URL}' -e DATABASE_URL='mongodb://${MONGO_CONTAINER}:27017/${DATABASE_NAME}?replicaSet=rs0&directConnection=true' ${IMAGE_REPO}:${CI_COMMIT_SHORT_SHA} uvicorn app.main:app --host 0.0.0.0 --port ${SERVICE_PORT};
      sudo docker image prune -af >/dev/null 2>&1 || true"

deploy:frontend:
  <<: *deploy_base
  stage: deploy-frontend
  script:
    - SSH_KEY_CONTENT="${SOFTEC_LF_SSH:-$SSH_PRIVATE_KEY}"
    - printf '%s\n' "$SSH_KEY_CONTENT" > ~/.ssh/id_rsa
    - IMAGE_REPO="${FRONTEND_IMAGE:-${DOCKER_REGISTRY_URL}/${DOCKER_USERNAME}/s-frontend}"
    - >
      ssh -o StrictHostKeyChecking=no "${SSH_REMOTE_USER}@${FRONTEND_EC2_IP}"
      "set -eu;
      echo '${DOCKER_PASSWORD_B64}' | base64 -d | sudo docker login -u '${DOCKER_USERNAME}' --password-stdin;
      sudo docker network create ${DEPLOY_NETWORK} >/dev/null 2>&1 || true;
      sudo docker stop hackathon-frontend >/dev/null 2>&1 || true;
      sudo docker rm -f hackathon-frontend >/dev/null 2>&1 || true;
      sudo docker pull ${IMAGE_REPO}:${CI_COMMIT_SHORT_SHA};
      sudo docker run -d --name hackathon-frontend --network ${DEPLOY_NETWORK} --restart unless-stopped -p 8080:80 ${IMAGE_REPO}:${CI_COMMIT_SHORT_SHA};
      sudo docker image prune -af >/dev/null 2>&1 || true"
  environment:
    name: production/frontend
    url: "http://${FRONTEND_EC2_IP}:8080"