services:
  redis:
    image: redis/redis-stack:latest
    container_name: hackathon-redis-prod
    ports:
      - "6381:6379"
      - "8002:8001"
    environment:
      REDIS_ARGS: "--requirepass 123123123 --appendonly yes"
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123123123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hackathon-network-prod
    restart: unless-stopped

volumes:
  redis_data_prod:

networks:
  hackathon-network-prod:
    external: true