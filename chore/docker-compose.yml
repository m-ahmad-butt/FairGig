services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    command: --replSet rs0 --bind_ip_all --noauth
    ports:
      - "27019:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - hackathon-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  mongo-init:
    image: mongo:7
    container_name: mongo-init
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - hackathon-network
    command: >
      bash -c "
        mongosh --host mongodb:27017 --quiet --eval \"rs.status().ok\" ||
        mongosh --host mongodb:27017 --eval \"rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]})\";
        echo 'MongoDB replica set is ready'
      "
    restart: "no"

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/?directConnection=true
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    networks:
      - hackathon-network
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--requirepass", "123123123"]
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - hackathon-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123123123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis-ui:
    image: redis/redisinsight:latest
    container_name: redis-ui
    ports:
      - "8001:5540"
    volumes:
      - redisinsight-data:/data
    networks:
      - hackathon-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5673:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin123
      RABBITMQ_DEFAULT_PASS: 123123123
      RABBITMQ_DEFAULT_VHOST: hackathon
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - hackathon-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s
    restart: unless-stopped

  prisma-push:
    build:
      context: ./setup/worker
      dockerfile: Dockerfile
    image: hackathon-worker
    container_name: prisma-push
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-mongodb://mongodb:27017/hackathon?replicaSet=rs0&directConnection=true}
    command: ["npx", "prisma", "db", "push"]
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    networks:
      - hackathon-network
    restart: "no"

  worker:
    build:
      context: ./setup/worker
      dockerfile: Dockerfile
    image: hackathon-worker
    container_name: hackathon-worker
    env_file:
      - ./.env
    environment:
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-mongodb://mongodb:27017/hackathon?replicaSet=rs0&directConnection=true}
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/hackathon?replicaSet=rs0&directConnection=true}
      REDIS_URL: ${REDIS_URL:-redis://:123123123@redis:6379}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://admin123:123123123@rabbitmq:5672/hackathon}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    ports:
      - "3001:3001"
    networks:
      - hackathon-network
    depends_on:
      prisma-push:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8001:8001"
    networks:
      - hackathon-network
    restart: unless-stopped

  earnings-service:
    build:
      context: ./backend/earnings-service
      dockerfile: Dockerfile
    container_name: earnings-service
    ports:
      - "8002:8002"
    networks:
      - hackathon-network
    restart: unless-stopped

  anomaly-service:
    build:
      context: ./backend/anomaly-service
      dockerfile: Dockerfile
    container_name: anomaly-service
    ports:
      - "8003:8003"
    networks:
      - hackathon-network
    restart: unless-stopped

  grievance-service:
    build:
      context: ./backend/grievance-service
      dockerfile: Dockerfile
    container_name: grievance-service
    ports:
      - "8004:8004"
    networks:
      - hackathon-network
    restart: unless-stopped

  analytics-service:
    build:
      context: ./backend/analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    ports:
      - "8005:8005"
    networks:
      - hackathon-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:3001}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
        VITE_AGENT_URL: ${VITE_AGENT_URL:-http://localhost:5000}
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - worker
    networks:
      - hackathon-network
    restart: unless-stopped

networks:
  hackathon-network:
    name: hackathon-network
    driver: bridge

volumes:
  mongodb-data:
  redis-data:
  redisinsight-data:
  rabbitmq-data:
