services:
  # MongoDB with Replica Set
  mongodb:
    image: mongo:7
    container_name: mongodb
    command: --replSet rs0 --bind_ip_all --noauth
    ports:
      - "27019:27017"
    volumes:
      - mongodb-data:/data/db
      - ./scripts/init-replica-set.js:/docker-entrypoint-initdb.d/init-replica-set.js:ro
    networks:
      - hackathon-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # MongoDB Replica Set Initializer
  mongo-init:
    image: mongo:7
    container_name: mongo-init
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - hackathon-network
    volumes:
      - ./scripts/init-replica-set.js:/init-replica-set.js:ro
    command: >
      bash -c "
        sleep 5 &&
        mongosh --host mongodb:27017 --file /init-replica-set.js &&
        echo 'MongoDB replica set initialization complete'
      "
    restart: "no"

  # MongoDB Express UI
  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/?directConnection=true
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    networks:
      - hackathon-network
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # Redis Stack (includes RedisInsight UI)
  redis:
    image: redis/redis-stack:latest
    container_name: redis
    ports:
      - "6380:6379"
      - "8001:8001"
    environment:
      REDIS_ARGS: "--requirepass 123123123"
    volumes:
      - redis-data:/data
    networks:
      - hackathon-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # RedisInsight UI
  redis-ui:
    image: redis/redisinsight:latest
    container_name: redis-ui
    ports:
      - "8001:5540"
    volumes:
      - redisinsight-data:/data
    networks:
      - hackathon-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # RabbitMQ with Management UI
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5673:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin123
      RABBITMQ_DEFAULT_PASS: 123123123
      RABBITMQ_DEFAULT_VHOST: hackathon
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - hackathon-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: softec-backend
    container_name: softec-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      AGENT_URL: ${AGENT_URL}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      TOKEN_BUCKET_CAPACITY: ${TOKEN_BUCKET_CAPACITY}
      REFILL_RATE: ${REFILL_RATE}
      REFILL_INTERVAL: ${REFILL_INTERVAL}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OLLAMA_URL: ${OLLAMA_URL}
    networks:
      - hackathon-network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
        VITE_AGENT_URL: ${VITE_AGENT_URL}
    image: softec-frontend
    container_name: softec-frontend
    ports:
      - "80:80"
    networks:
      - hackathon-network
    depends_on:
      - backend
    restart: unless-stopped

  # Agent Service
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    image: softec-agent
    container_name: softec-agent
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
    networks:
      - hackathon-network
    restart: unless-stopped

networks:
  hackathon-network:
    driver: bridge

volumes:
  mongodb-data:
  redis-data:
  rabbitmq-data:
