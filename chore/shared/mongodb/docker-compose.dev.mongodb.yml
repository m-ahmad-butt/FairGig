services:
  mongodb:
    image: mongo:latest
    container_name: hackathon-mongodb
    ports:
      - "27019:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin123
      - MONGO_INITDB_ROOT_PASSWORD=123123123
    volumes:
      - mongo_data:/data/db
    entrypoint:
      - bash
      - -c
      - |
        echo "hackathonreplicasetkeyfilesecret1234567890" > /tmp/keyfile
        chmod 400 /tmp/keyfile
        chown 999:999 /tmp/keyfile
        exec docker-entrypoint.sh mongod --replSet rs0 --keyFile /tmp/keyfile --bind_ip_all
    healthcheck:
      test: ["CMD", "mongosh", "--host", "localhost", "--port", "27017", "-u", "admin123", "-p", "123123123", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - hackathon-network

  mongo-init-replica:
    image: mongo:latest
    container_name: hackathon-mongo-init-replica
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint: >
      bash -c "
        echo 'MongoDB is healthy, initializing replica set...' &&
        mongosh --host mongodb:27017 -u admin123 -p 123123123 --authenticationDatabase admin --eval '
          try {
            var status = rs.status();
            print(\"Replica set already initialized: \" + status.set);
          } catch(e) {
            print(\"Initiating replica set...\");
            rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongodb:27017\"}]});
          }
        '
      "
    networks:
      - hackathon-network

  mongo-express:
    image: mongo-express:latest
    container_name: hackathon-mongo-express
    ports:
      - "8083:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin123
      - ME_CONFIG_MONGODB_ADMINPASSWORD=123123123
      - ME_CONFIG_MONGODB_URL=mongodb://admin123:123123123@mongodb:27017/?replicaSet=rs0&directConnection=true
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      mongo-init-replica:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - hackathon-network

volumes:
  mongo_data:

networks:
  hackathon-network:
    external: true