services:
  redis:
    image: redis/redis-stack:latest
    container_name: hackathon-redis
    ports:
      - "6380:6379"
      - "8001:8001"
    environment:
      REDIS_ARGS: "--requirepass 123123123"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - hackathon-network

volumes:
  redis_data:

networks:
  hackathon-network:
    external: true