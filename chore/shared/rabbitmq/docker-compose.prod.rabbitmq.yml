services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: hackathon-rabbitmq-prod
    ports:
      - "5674:5672"
      - "15674:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin123
      - RABBITMQ_DEFAULT_PASS=123123123
      - RABBITMQ_DEFAULT_VHOST=hackathon-prod
    volumes:
      - rabbitmq_data_prod:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - hackathon-network-prod
    restart: unless-stopped

volumes:
  rabbitmq_data_prod:

networks:
  hackathon-network-prod:
    external: true