services:
  earnings-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: earnings-service-local
    env_file:
      - .env
    ports:
      - '4002:4002'
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: earnings-service-mongo-local
    ports:
      - '0:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
