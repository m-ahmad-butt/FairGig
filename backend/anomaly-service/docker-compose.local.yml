services:
  anomaly-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anomaly-service-local
    env_file:
      - .env
    ports:
      - '8002:8002'
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: anomaly-service-mongo-local
    ports:
      - '0:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
