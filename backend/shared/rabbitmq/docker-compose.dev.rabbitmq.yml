services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: hackathon-rabbitmq
    ports:
      - "5673:5672"     # app connection port
      - "15673:15672"   # management UI port
    environment:
      RABBITMQ_DEFAULT_USER: admin123
      RABBITMQ_DEFAULT_PASS: 123123123
      RABBITMQ_DEFAULT_VHOST: hackathon
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - hackathon-network

volumes:
  rabbitmq_data:

networks:
  hackathon-network:
    external: true