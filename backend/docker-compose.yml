    environment:
      - ME_CONFIG_MONGODB_SERVER=certificate-mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH=false
    ports:
      - '8084:8081'
    depends_on:
      - certificate-mongo

  shared-agent-mongo:
    image: mongo:7
    container_name: shared-agent-mongo
