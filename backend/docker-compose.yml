      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH=false
    ports:
      - '8083:8081'
    depends_on:
      - grievance-mongo

  certificate-mongo:
    image: mongo:7
    container_name: certificate-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
