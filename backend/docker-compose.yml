services:
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    env_file:
      - ../.env
    environment:
      - PORT=8080
      - AUTH_SERVICE_URL=http://auth-service:4001
      - EARNINGS_SERVICE_URL=http://earnings-service:4002
      - GRIEVANCE_SERVICE_URL=http://grievance-service:4003
      - CERTIFICATE_SERVICE_URL=http://certificate-service:4004
      - SHARED_AGENT_SERVICE_URL=http://shared-agent-service:4005
      - ANALYTICS_SERVICE_URL=http://analytics-service:8001
      - ANOMALY_SERVICE_URL=http://anomaly-service:8002
    ports:
      - '8080:8080'
    depends_on:
      - auth-service
      - earnings-service
      - grievance-service
      - certificate-service
      - shared-agent-service
      - analytics-service
      - anomaly-service

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=mongodb://auth-mongo:27017/auth_service?replicaSet=rs0
      - PORT=4001
      - SERVICE_NAME=auth-service
    ports:
      - '4001:4001'
    depends_on:
      auth-mongo:
        condition: service_healthy

  earnings-service:
    build:
      context: ./earnings-service
      dockerfile: Dockerfile
    container_name: earnings-service
    environment:
      - DATABASE_URL=mongodb://earnings-mongo:27017/earnings_service?replicaSet=rs0
    ports:
      - '4002:4002'
    depends_on:
      earnings-mongo:
        condition: service_healthy

  grievance-service:
    build:
      context: ./grievance-service
      dockerfile: Dockerfile
    container_name: grievance-service
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=mongodb://grievance-mongo:27017/grievance_service?replicaSet=rs0
    ports:
      - '4003:4003'
    depends_on:
      grievance-mongo:
        condition: service_healthy

  certificate-service:
    build:
      context: ./certificate-service
      dockerfile: Dockerfile
    container_name: certificate-service
    environment:
      - DATABASE_URL=mongodb://certificate-mongo:27017/certificate_service?replicaSet=rs0
    ports:
      - '4004:4004'
    depends_on:
      certificate-mongo:
        condition: service_healthy

  shared-agent-service:
    build:
      context: ./shared-agent-service
      dockerfile: Dockerfile
    container_name: shared-agent-service
    environment:
      - DATABASE_URL=mongodb://shared-agent-mongo:27017/shared_agent_service?replicaSet=rs0
    ports:
      - '4005:4005'
    depends_on:
      shared-agent-mongo:
        condition: service_healthy

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    environment:
      - DATABASE_URL=mongodb://analytics-mongo:27017/analytics_service?replicaSet=rs0
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    ports:
      - '8001:8001'
    depends_on:
      analytics-mongo:
        condition: service_healthy

  anomaly-service:
    build:
      context: ./anomaly-service
      dockerfile: Dockerfile
    container_name: anomaly-service
    environment:
      - DATABASE_URL=mongodb://anomaly-mongo:27017/anomaly_service?replicaSet=rs0
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002
    ports:
      - '8002:8002'
    depends_on:
      anomaly-mongo:
        condition: service_healthy

  auth-mongo:
    image: mongo:7
    container_name: auth-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - auth_mongo_data:/data/db
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'auth-mongo:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      start_period: 0s
      start_interval: 1s
      retries: 30

  auth-mongo-express:
    image: mongo-express:latest
    container_name: auth-mongo-express
    environment:
      - ME_CONFIG_MONGODB_SERVER=auth-mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH=false
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
    ports:
      - '8081:8081'
    depends_on:
      auth-mongo:
        condition: service_healthy

  earnings-mongo:
    image: mongo:7
    container_name: earnings-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - earnings_mongo_data:/data/db
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'earnings-mongo:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      start_period: 0s
      start_interval: 1s
      retries: 30

  earnings-mongo-express:
    image: mongo-express:latest
    container_name: earnings-mongo-express
    environment:
      - ME_CONFIG_MONGODB_SERVER=earnings-mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH=false
    ports:
      - '8082:8081'
    depends_on:
      - earnings-mongo

  grievance-mongo:
